<!DOCTYPE html>

</head>

<body>

    <div class="menu-container">

        <div id="dropdown" class="dropdown hidden">

            <a href="/flashcards">Flashcards</a>

<div class="content">

</div>

<script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
